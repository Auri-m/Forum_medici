<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedForum - Login</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <div class="logo">✚</div>

        <h1>Medical Connect</h1>
        <p class="subtitle">Accesso riservato al personale medico</p>

        <form action="/login-process" method="POST">
            <div class="form-group">
                <label for="fnomed">Username</label>
                <input type="text" id="fnomed" name="username" placeholder="Inserisci le tue credenziali" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Accedi al Forum</button>
        </form>

        <div class="extra-links">
            <a href="#">Password dimenticata?</a>
            <a href="registrazione.html">Richiedi iscrizione</a>
        </div>
    </div>

</body>

</html>
