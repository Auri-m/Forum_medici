<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedForum | Registrazione Medico</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #eef2f7;
            --accent-color: #00a8cc;
            --text-dark: #333;
            --text-muted: #666;
            --white: #ffffff;
            --border-color: #d1d5db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .register-container {
            background: var(--white);
            width: 100%;
            max-width: 750px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-section h1 {
            color: var(--primary-color);
            font-size: 26px;
            margin-bottom: 8px;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 15px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        /* Campi che occupano tutta la larghezza */
        .full-width {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-dark);
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            padding: 12px 15px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
            background-color: #fcfcfc;
        }

        input:focus,
        select:focus {
            border-color: var(--primary-color);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        input[type="file"] {
            padding: 10px;
            border: 1.5px dashed var(--border-color);
            border-radius: 8px;
            background-color: #f9fafb;
            cursor: pointer;
            width: 100%;
        }

        .submit-btn {
            grid-column: span 2;
            padding: 14px;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #004494;
        }

        .submit-btn:active {
            transform: scale(0.99);
        }

        .login-link {
            grid-column: span 2;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Responsive Design per Smartphone */
        @media (max-width: 650px) {
            form {
                grid-template-columns: 1fr;
            }

            .full-width,
            .submit-btn,
            .login-link {
                grid-column: span 1;
            }

            .register-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="register-container">
        <div class="header-section">
            <h1>Crea il tuo Profilo</h1>
            <p>Unisciti alla rete esclusiva per professionisti del settore medico.</p>
        </div>

        <form action="/register-process" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Scegli un nome utente" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Minimo 8 caratteri" required>
            </div>

            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Es. Mario" required>
            </div>

            <div class="form-group">
                <label for="cognome">Cognome</label>
                <input type="text" id="cognome" name="cognome" placeholder="Es. Rossi" required>
            </div>

            <div class="form-group">
                <label for="eta">Età</label>
                <input type="number" id="eta" name="eta" min="24" max="100" placeholder="Anni" required>
            </div>

            <div class="form-group">
                <label for="anni_esperienza">Anni di esperienza</label>
                <input type="number" id="anni_esperienza" name="anni_esperienza" min="0" max="70" placeholder="Es. 10"
                    required>
            </div>

            <div class="form-group">
                <label for="specializzazione">Specializzazione</label>
                <select id="specializzazione" name="specializzazione" required>
                    <option value="" disabled selected>Seleziona una branca...</option>
                    <option value="cardiologia">Cardiologia</option>
                    <option value="chirurgia">Chirurgia Generale</option>
                    <option value="dermatologia">Dermatologia</option>
                    <option value="medicina_interna">Medicina Interna</option>
                    <option value="neurologia">Neurologia</option>
                    <option value="pediatria">Pediatria</option>
                    <option value="psichiatria">Psichiatria</option>
                    <option value="altro">Altro...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ospedale">Ospedale / Struttura di appartenenza</label>
                <input type="text" id="ospedale" name="ospedale" placeholder="Es. Policlinico di Milano" required>
            </div>

            <div class="form-group full-width">
                <label for="foto_profilo">Foto Profilo (Formati supportati: JPG, PNG)</label>
                <input type="file" id="foto_profilo" name="foto_profilo" accept="image/png, image/jpeg" required>
            </div>

            <button type="submit" class="submit-btn">Completa Registrazione</button>

            <div class="login-link">
                Sei già registrato? <a href="index.html">Accedi qui</a>
            </div>
        </form>
    </div>

</body>

</html>
